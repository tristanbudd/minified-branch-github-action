<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 2: Popup Modal</title>
    <link rel="stylesheet" href="modal.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <h1>Modal Demonstration</h1>
      <button id="triggerModalBtn" class="action-btn">Open Information Modal</button>
    </div>

    <div id="informationModal" class="modal-overlay hidden">
      <div class="modal-content-box">
        <h2>Important Information</h2>
        <p>This is a test modal to demonstrate JavaScript class toggling and CSS transitions.</p>
        <button id="closeModalBtn" class="close-btn">Close Modal</button>
      </div>
    </div>
    <script src="modal.js"></script>
  </body>
</html>
