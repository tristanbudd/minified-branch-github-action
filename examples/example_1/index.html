<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 1: Interactive Counter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="counter-container">
      <h1>Interactive Counter</h1>
      <p class="counter-display" id="counterValue">0</p>
      <div class="button-group">
        <button id="decrementButton" class="btn btn-danger">Decrease</button>
        <button id="incrementButton" class="btn btn-success">Increase</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
